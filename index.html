<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard - Outreach CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <!-- App Header Container (injected dynamically) -->
      <div id="app-header-container"></div>

      <main class="main-content">
        <!-- Hero Panel -->
        <section class="hero-panel">
          <div>
            <p class="eyebrow">Outreach Dashboard</p>
            <h2>Statistik prospek Anda rapi, cepat, dan mudah dipantau.</h2>
          </div>
          <div class="follow-up-card">
            <p class="panel-label">Follow up terdekat</p>
            <div id="nextFollowUp" class="next-follow-up">Menghubungkan data...</div>
          </div>
        </section>

        <!-- Stats Grid -->
        <section class="stats-grid" id="statsGrid" aria-label="Ringkasan prospek"></section>

        <!-- Recent Activity & Database overview -->
        <div class="table-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Aktivitas Terbaru</p>
              <h3>Prospek Terbaru</h3>
            </div>
            <a href="prospects.html" class="primary-button" style="min-height:36px; padding: 0 16px; font-size:12px;">Lihat Semua Database</a>
          </div>

          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Prospek</th>
                  <th>Kontak</th>
                  <th>Jasa</th>
                  <th>Tanggal Pesan</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="recentRows">
                <tr>
                  <td colspan="6" class="empty-state">Mengambil data terbaru...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- Detail Dialog -->
    <dialog id="detailDialog" class="detail-dialog">
      <div class="detail-header">
        <div>
          <p class="eyebrow">Detail prospek</p>
          <h3 id="detailName">Nama prospek</h3>
        </div>
        <button id="closeDetailButton" class="ghost-button" type="button" style="min-height:32px; padding:0 12px; font-size:12px;">Tutup</button>
      </div>
      <div id="detailBody" class="detail-body"></div>
    </dialog>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="common.js"></script>
    <script src="dashboard.js"></script>
  </body>
</html>
