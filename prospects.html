<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Database Prospek - Outreach CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="page-shell">
      <!-- App Header Container (injected dynamically) -->
      <div id="app-header-container"></div>

      <main class="main-content">
        <div class="table-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Database Utama</p>
              <h3>Daftar Prospek</h3>
            </div>
            <div style="display: flex; gap: 10px; align-items: center;">
              <span id="resultCount" class="result-count">0 data</span>
              <a href="input.html" class="primary-button" style="min-height:36px; padding: 0 16px; font-size:12px;">+ Tambah Prospek</a>
            </div>
          </div>

          <!-- Filters -->
          <div class="filters">
            <input id="searchInput" type="search" placeholder="Cari nama, username IG, nomor WA, niche, dll..." />
            
            <select id="statusFilter">
              <option value="Semua">Semua Status</option>
            </select>
            
            <select id="sourceFilter">
              <option value="Semua">Semua Sumber</option>
              <option value="Instagram">Instagram</option>
              <option value="WhatsApp">WhatsApp</option>
              <option value="Keduanya">Keduanya</option>
            </select>

            <select id="channelFilter">
              <option value="Semua">Semua Channel</option>
              <option value="Instagram DM">Instagram DM</option>
              <option value="WhatsApp">WhatsApp</option>
              <option value="Keduanya">Keduanya</option>
            </select>

            <select id="sortSelect">
              <option value="sentDateDesc">Tanggal Kirim: Terbaru</option>
              <option value="sentDateAsc">Tanggal Kirim: Terlama</option>
              <option value="followUpAsc">Follow Up: Terdekat</option>
              <option value="followUpDesc">Follow Up: Terjauh</option>
            </select>
          </div>

          <!-- Table Wrapper -->
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Prospek</th>
                  <th>Kontak</th>
                  <th>Jasa Ditawarkan</th>
                  <th>Tanggal Penting</th>
                  <th>Status</th>
                  <th>Aksi</th>
                </tr>
              </thead>
              <tbody id="prospectRows">
                <tr>
                  <td colspan="6" class="empty-state">Mengambil data prospek...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>
      </main>
    </div>

    <!-- Detail Dialog -->
    <dialog id="detailDialog" class="detail-dialog">
      <div class="detail-header">
        <div>
          <p class="eyebrow">Detail Prospek</p>
          <h3 id="detailName">Nama prospek</h3>
        </div>
        <button id="closeDetailButton" class="ghost-button" type="button" style="min-height:32px; padding:0 12px; font-size:12px;">Tutup</button>
      </div>
      <div id="detailBody" class="detail-body"></div>
    </dialog>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="common.js?v=2"></script>
    <script src="prospects.js?v=2"></script>
  </body>
</html>
