<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Input Data - Outreach CRM</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css?v=3" />
  </head>
  <body>
    <div class="page-shell">
      <!-- App Header Container (injected dynamically) -->
      <div id="app-header-container"></div>

      <main class="main-content">
        <div class="form-panel">
          <div class="section-heading">
            <div>
              <p class="eyebrow">Formulir Prospek</p>
              <h3 id="formTitle">Tambah Prospek Baru</h3>
            </div>
            <a href="prospects.html" class="ghost-button" style="min-height:36px; padding: 0 16px; font-size:12px;">Lihat Database</a>
          </div>

          <form id="prospectForm" class="prospect-form">
            <input type="hidden" id="prospectId" />

            <!-- Group: Profil -->
            <div class="form-group">
              <p class="group-title">1. Profil Target</p>
              <label>
                Nama Bisnis / Target *
                <input id="name" type="text" placeholder="Contoh: Rafi Studio" required />
              </label>

              <label>
                Niche / Bidang Bisnis
                <select id="niche">
                  <option value="">Pilih niche</option>
                  <option value="Klinik Gigi">Klinik Gigi</option>
                  <option value="Catering">Catering</option>
                  <option value="Skincare">Skincare</option>
                  <option value="Kuliner">Kuliner</option>
                  <option value="Fashion">Fashion</option>
                  <option value="Properti">Properti</option>
                  <option value="Pendidikan">Pendidikan</option>
                  <option value="Lainnya">Lainnya</option>
                </select>
              </label>

              <label>
                Jenis Jasa yang Ditawarkan
                <select id="service">
                  <option value="">Pilih jasa</option>
                  <option value="Landing Page">Landing Page</option>
                  <option value="Company Profile">Company Profile</option>
                  <option value="Website Booking">Website Booking</option>
                  <option value="Katalog Online">Katalog Online</option>
                  <option value="Toko Online">Toko Online</option>
                  <option value="Maintenance Website">Maintenance Website</option>
                  <option value="Lainnya">Lainnya</option>
                </select>
              </label>
            </div>

            <!-- Group: Kontak -->
            <div class="form-group">
              <p class="group-title">2. Detail Kontak</p>
              <label>
                Sumber Kontak
                <select id="source" required>
                  <option value="Instagram">Instagram</option>
                  <option value="WhatsApp">WhatsApp</option>
                  <option value="Keduanya">Keduanya</option>
                </select>
              </label>

              <label>
                Username Instagram
                <input id="instagram" type="text" placeholder="@username" />
              </label>

              <label>
                Link Profil Instagram
                <input id="instagramLink" type="url" placeholder="https://instagram.com/username" />
              </label>

              <label>
                Nomor WhatsApp
                <input id="whatsapp" type="tel" placeholder="Contoh: 628123456789 (gunakan kode negara)" />
              </label>
            </div>

            <!-- Group: Outreach -->
            <div class="form-group full-width">
              <p class="group-title">3. Status & Progres Outreach</p>
              <div style="display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px;">
                <label>
                  Tanggal Kirim Pesan
                  <input id="sentDate" type="date" />
                </label>

                <label>
                  Tanggal Follow Up Berikutnya
                  <input id="followUpDate" type="date" />
                </label>

                <label>
                  Channel Outreach
                  <select id="channel" required>
                    <option value="Instagram DM">Instagram DM</option>
                    <option value="WhatsApp">WhatsApp</option>
                    <option value="Keduanya">Keduanya</option>
                  </select>
                </label>

                <label>
                  Status Prospek
                  <select id="status" required>
                    <option value="Belum dikirim">Belum dikirim</option>
                    <option value="Sudah dikirim">Sudah dikirim</option>
                    <option value="Membalas">Membalas</option>
                    <option value="Tertarik">Tertarik</option>
                    <option value="Follow up">Follow up</option>
                    <option value="Closing">Closing</option>
                    <option value="Tidak tertarik">Tidak tertarik</option>
                  </select>
                </label>
              </div>
            </div>

            <!-- Notes -->
            <label class="full-width">
              Catatan Prospek / Hasil Percakapan
              <textarea id="notes" rows="4" placeholder="Contoh: sudah tanya harga, follow up paket basic besok..."></textarea>
            </label>

            <!-- WA Link Generator Preview -->
            <div class="generated-link full-width">
              <span>Link WhatsApp Otomatis</span>
              <a id="generatedWaLink" href="#" target="_blank" rel="noreferrer">
                <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
                <span id="waLinkText">Isi data target terlebih dahulu</span>
              </a>
            </div>

            <!-- Actions -->
            <div class="button-row full-width" style="justify-content: flex-end;">
              <button id="cancelButton" type="button" class="ghost-button">Batal</button>
              <button type="submit" class="primary-button" id="saveButton">Simpan Prospek</button>
            </div>
          </form>
        </div>
      </main>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="common.js?v=2"></script>
    <script src="input.js?v=2"></script>
  </body>
</html>
